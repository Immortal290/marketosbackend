# ─── MarketOS Backend — docker-compose (backend-only) ────────────────────────
#
#  Runs the Node.js API + its dependencies (Postgres, Redis).
#  Kafka / Zookeeper are excluded — Kafka is disabled in server.ts.
#
#  Usage (from marketos-backend/):
#    docker compose build && docker compose up
#    docker compose up -d               # background
#    docker compose down -v             # stop + remove volumes
#    docker compose logs -f app         # tail app logs
#
#  Host ports (remapped to avoid conflicts with other local services):
#    API      → http://localhost:3000
#    Postgres → localhost:5433   (internal: 5432)
#    Redis    → localhost:6380   (internal: 6379)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: marketos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       marketos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: marketos_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  app:
    build:
      context: ..                              # project root — grants access to both backend & frontend
      dockerfile: marketos-backend/Dockerfile
    container_name: marketos_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:               production
      PORT:                   3000
      DATABASE_URL:           postgresql://postgres:postgres@db:5432/marketos?schema=public
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      JWT_SECRET:             super_secret_jwt_key_for_development_only
      JWT_EXPIRES_IN:         1d
      JWT_REFRESH_SECRET:     super_secret_refresh_key_for_development_only
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL:           https://digitalmarketingagent-production.up.railway.app
      ALLOWED_ORIGINS:        "https://digitalmarketingagent-production.up.railway.app,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500,http://127.0.0.1:5500"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
