# ─── MarketOS — Full Stack Docker Compose ────────────────────────────────────
#
#  Services:
#    frontend  → nginx serving static HTML/CSS/JS   → http://localhost:8080
#    backend   → Node.js / Express API + Socket.io  → http://localhost:3000
#    db        → PostgreSQL 15                       → localhost:5432
#    redis     → Redis 7                             → localhost:6379
#
#  Usage:
#    docker compose up --build          # first run
#    docker compose up -d               # background
#    docker compose down -v             # stop + remove volumes
#    docker compose logs -f backend     # tail backend logs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: marketos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-marketos}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-marketos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: marketos_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./marketos-backend
      dockerfile: Dockerfile
    container_name: marketos_backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV:               production
      PORT:                   3000
      DATABASE_URL:           postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-marketos}?schema=public
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      JWT_SECRET:             ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS:        ${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:3001,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}
      KAFKA_BROKER:           redpanda:9092
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Kafka (Redpanda) ────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: marketos_redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --default-log-level=warn
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - "18082:18082"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── AI Agents (Python) ──────────────────────────────────────────────────────
  agents:
    build:
      context: .
      dockerfile: Dockerfile.agents
    container_name: marketos_agents
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BROKERS=redpanda:9092
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-marketos}?schema=public
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    ports:
      - "8000:8000"
    # Run the FastAPI server (exposes /v1/query/stream and all existing endpoints)
    command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]

